name: Release (PyPI)

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: manylinux_2_28
          args: --release --out dist
          working-directory: turbovec-python
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y openblas-devel openssl-devel pkgconfig
            elif command -v yum >/dev/null 2>&1; then
              yum install -y openblas-devel openssl-devel pkgconfig
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y libopenblas-dev libssl-dev pkg-config
            else
              echo "No supported package manager found" && exit 1
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: turbovec-python/dist

  macos:
    name: macOS aarch64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist
          working-directory: turbovec-python
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: turbovec-python/dist

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          working-directory: turbovec-python
      - name: Install wheel and run tests
        shell: bash
        working-directory: turbovec-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install dist/*.whl
          python -m pytest tests/test_index.py tests/test_id_map.py tests/test_filtering.py -v
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: turbovec-python/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: turbovec-python
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: turbovec-python/dist

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/py-v')
    environment:
      name: pypi
      url: https://pypi.org/project/turbovec
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
